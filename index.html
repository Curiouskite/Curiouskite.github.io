<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Drive API Test</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        h2 {
            margin-top: 0;
            color: #2c3e50;
        }
        .btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
            width: 100%;
            margin-top: 10px;
        }
        .btn:hover {
            background-color: #2980b9;
        }
        .btn:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }
        .section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #e2e8f0;
            border-radius: 5px;
            background-color: #fafbfc;
        }
        input[type="file"] {
            margin: 15px 0;
        }
        #status {
            margin-top: 15px;
            padding: 10px;
            border-radius: 5px;
            background-color: #edf2f7;
            font-size: 14px;
            word-break: break-all;
            max-height: 100px;
            overflow-y: auto;
        }
        .hidden {
            display: none;
        }
    </style>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

<div class="container">
    <h2>Google Drive Tester</h2>
    
    <div class="section">
        <h3>Step 1: Authenticate</h3>
        <button id="authBtn" class="btn" onclick="handleAuthClick()">Connect Google Drive</button>
    </div>

    <div id="uploadSection" class="section hidden">
        <h3>Step 2: Upload a File</h3>
        <input type="file" id="fileInput">
        <button id="uploadBtn" class="btn" onclick="uploadFile()">Upload to Drive</button>
    </div>

    <div id="downloadSection" class="section hidden">
        <h3>Step 3: Verify Success</h3>
        <p>File uploaded successfully! Click below to download it back to verify.</p>
        <button id="downloadBtn" class="btn" style="background-color: #2ecc71;" onclick="downloadFile()">Download Uploaded File</button>
    </div>

    <div id="status">Status: Waiting for authentication...</div>
</div>

<script>
    const CLIENT_ID = '491213598703-aqg336vpatu8tnvbjbcrgu7jp0vde6nq.apps.googleusercontent.com';
    const SCOPES = 'https://www.googleapis.com/auth/drive.file'; // Allows access to files uploaded/created by this app
    
    let tokenClient;
    let accessToken = null;
    let lastUploadedFileId = null;
    let lastUploadedFileName = '';

    // Initialize the Google Identity Services client once the library loads
    window.onload = function () {
        try {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: (tokenResponse) => {
                    if (tokenResponse && tokenResponse.access_token) {
                        accessToken = tokenResponse.access_token;
                        updateStatus('Successfully authenticated with Google!');
                        document.getElementById('authBtn').innerText = 'Authenticated ✓';
                        document.getElementById('authBtn').disabled = true;
                        document.getElementById('uploadSection').classList.remove('hidden');
                    }
                },
            });
            updateStatus('Google client initialized. Please authenticate.');
        } catch (error) {
            updateStatus('Error initializing Google script: ' + error.message);
        }
    };

    // Trigger OAuth 2.0 flow
    function handleAuthClick() {
        if (tokenClient) {
            tokenClient.requestAccessToken({ prompt: 'consent' });
        } else {
            updateStatus('Google Identity library not loaded yet.');
        }
    }

    // Multipart upload combining Metadata JSON and raw Binary payload
    async function uploadFile() {
        const fileInput = document.getElementById('fileInput');
        if (fileInput.files.length === 0) {
            alert('Please select a file first.');
            return;
        }

        const file = fileInput.files[0];
        lastUploadedFileName = file.name;
        updateStatus(`Uploading "${file.name}"...`);
        document.getElementById('uploadBtn').disabled = true;

        const metadata = {
            name: file.name,
            mimeType: file.type
        };

        const boundary = '321742694312307532';
        const delimiter = `\r\n--${boundary}\r\n`;
        const close_delim = `\r\n--${boundary}--`;

        const header = `${delimiter}Content-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(metadata)}${delimiter}Content-Type: ${file.type}\r\n\r\n`;
        const footer = close_delim;

        // Build composite blob mimicking a multipart request
        const multipartBlob = new Blob([header, file, footer], { type: `multipart/related; boundary=${boundary}` });

        try {
            const response = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                method: 'POST',
                headers: new Headers({
                    'Authorization': 'Bearer ' + accessToken
                }),
                body: multipartBlob
            });

            if (!response.ok) throw new Error(await response.text());

            const data = await response.json();
            lastUploadedFileId = data.id;
            
            updateStatus(`Success! File ID created: ${lastUploadedFileId}`);
            document.getElementById('downloadSection').classList.remove('hidden');
        } catch (error) {
            updateStatus('Upload failed: ' + error.message);
            console.error(error);
        } finally {
            document.getElementById('uploadBtn').disabled = false;
        }
    }

    // Download file directly using the file ID from step 2
    async function downloadFile() {
        if (!lastUploadedFileId) return;
        updateStatus('Downloading file back...');

        try {
            const response = await fetch(`https://www.googleapis.com/drive/v3/files/${lastUploadedFileId}?alt=media`, {
                method: 'GET',
                headers: new Headers({
                    'Authorization': 'Bearer ' + accessToken
                })
            });

            if (!response.ok) throw new Error(await response.text());

            const blob = await response.blob();
            
            // Generate a hidden download link to prompt native browser download
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'Verified_' + lastUploadedFileName;
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
            a.remove();
            
            updateStatus('File downloaded successfully! Check your downloads folder.');
        } catch (error) {
            updateStatus('Download failed: ' + error.message);
            console.error(error);
        }
    }

    function updateStatus(msg) {
        document.getElementById('status').innerText = 'Status: ' + msg;
    }
</script>

</body>
</html>
